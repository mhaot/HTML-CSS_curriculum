<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <meta name="expires" content="604800">
    <meta name="format-detection" content="email=no,telephone=no,address=no">
    <title>スマートウォッチ</title>
    <meta name="description" content="スマートウォッチのカタログです">
    <link rel="icon" href="./assets/images/favicon.ico">
    <link rel="stylesheet" href="./assets/css/reset.css">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
    <header class="l-header">
        <h1 class="c-title">- Catalog -</h1>
    </header>
    <main class="l-main">
        <section class="p-pickUp">
            <span class="c-label c-label--pickup">PickUp</span>

            <div class="p-pickUp__body">
                <img class="c-image c-image--pickup" src="./assets/images/lesson2/img_pickUp.jpg" alt="スマートウォッチ">
                <h2 class="c-title c-title--pickup">
                    スマートウォッチ
                    <span class="p-pickUp__icon">
                        <img class="c-icon c-icon--cart" src="./assets/images/lesson2/logo_pickUp.png" alt="買い物かご">
                    </span>
                </h2>
                <p class="p-pickUp__description">
                    洗練されたデザインと最先端の機能を兼ね備えたスマートウォッチです。
                </p>
                <ul class="p-pickUp__spec">
                    <li class="p-pickUp__spec-item">カラー：モカグレー</li>
                    <li class="p-pickUp__spec-item">サイズ：S/M/L</li>
                    <li class="p-pickUp__spec-item">バッテリー：最大7日間</li>
                    <li class="p-pickUp__spec-item">充電時間：約2時間</li>
                </ul>
                <p class="p-pickUp__price">
                    <span class="c-text c-text--small">&yen;</span>19,800<span class="c-text c-text--small">（税込）</span>
                </p>
                <ul class="p-pickUp__tag">
                    <li><a class="p-pickUp__tag-item" href="#">＃おしゃれ</a></li>
                    <li><a class="p-pickUp__tag-item" href="#">＃シンプル</a></li>
                    <li><a class="p-pickUp__tag-item" href="#">＃普段使い</a></li>
                </ul>
            </div>
        </section>
    </main>
</body>
